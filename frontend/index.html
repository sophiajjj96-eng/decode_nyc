<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audit the Algorithm</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Audit the Algorithm</h1>
    <span id="status-label">ready</span>
  </div>
</header>

<div id="chat">
  <div class="empty" id="empty">
    <p>Find out how NYC's algorithms affect you</p>
  </div>
</div>

<footer>
  <div id="form">
    <textarea id="input" rows="1" placeholder="e.g. Does the NYPD use AI to make decisions about me?"></textarea>
    <button id="send" title="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
    <button id="mic-btn" class="idle" title="Speech to text">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
    </button>
    <button id="voice-btn" class="idle" title="Voice conversation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path d="M15.5 8.5c.79.64 1.5 1.62 1.5 3.5s-.71 2.86-1.5 3.5"/>
        <path d="M19 5.5a9 9 0 010 13"/>
      </svg>
    </button>
  </div>
  <div id="voice-bars" class="hidden">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>
</footer>

<!-- script loaded as ES module for audio worklet imports -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/app.js" type="module"></script>
</body>
</html>
