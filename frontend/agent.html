<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audit the Algorithm</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Audit the Algorithm</h1>
    <span id="status-indicator" class="status-indicator"></span>
  </div>
  <div class="header-actions">
    <button id="new-conversation-btn" class="header-btn" title="Start new conversation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="1 4 1 10 7 10"/>
        <path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/>
      </svg>
    </button>
    <button id="flag-bias-btn" class="flag-bias-btn" title="Flag for bias">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/>
        <line x1="4" y1="22" x2="4" y2="15"/>
      </svg>
    </button>
  </div>
</header>

<div id="chat">
  <div class="empty" id="empty">
    <p>Find out how NYC's algorithms affect you</p>
  </div>
</div>

<footer>
  <div id="form">
    <textarea id="input" rows="1" placeholder="e.g. Does the NYPD use AI to make decisions about me?"></textarea>
    <button id="send" title="Send message">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
    <button id="mic-btn" class="idle" title="Speech to text">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 2a3 3 0 0 1 3 3v7a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="22"/>
      </svg>
    </button>
    <button id="voice-btn" class="idle" title="Voice conversation">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M11 5L6 9H2v6h4l5 4V5z"/>
        <path d="M15.5 8.5c.79.64 1.5 1.62 1.5 3.5s-.71 2.86-1.5 3.5"/>
        <path d="M19 5.5a9 9 0 010 13"/>
      </svg>
    </button>
  </div>
  <div id="voice-bars" class="hidden">
    <div class="bar"></div><div class="bar"></div><div class="bar"></div>
    <div class="bar"></div><div class="bar"></div>
  </div>
</footer>

<!-- Bias Report Modal -->
<div id="bias-modal" class="modal-overlay hidden">
  <div class="modal-container">
    <div class="modal-header">
      <h2>Flag for Bias</h2>
      <button id="modal-close-btn" class="modal-close" title="Close">&times;</button>
    </div>
    
    <div id="modal-form" class="modal-body">
      <div class="form-field">
        <label for="bias-title">Issue Summary</label>
        <input type="text" id="bias-title" readonly placeholder="Generating..."/>
      </div>
      
      <div class="form-field">
        <label for="bias-email">Contact Email <span class="optional">(optional)</span></label>
        <input type="email" id="bias-email" placeholder="your.email@example.com"/>
      </div>
      
      <div class="form-field">
        <label for="bias-body">Conversation Context</label>
        <textarea id="bias-body" rows="4" readonly placeholder="Generating..."></textarea>
      </div>
      
      <div class="form-field">
        <label for="bias-explanation">Your Explanation</label>
        <textarea id="bias-explanation" rows="4" placeholder="Describe the bias issue you observed..."></textarea>
      </div>
      
      <div class="modal-actions">
        <button id="discard-btn" class="btn-secondary">Discard</button>
        <button id="submit-bias-btn" class="btn-primary">Submit</button>
      </div>
    </div>
    
    <div id="modal-thank-you" class="modal-body hidden">
      <div class="thank-you-content">
        <svg class="check-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
          <polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
        <h3>Thank You</h3>
        <p id="thank-you-summary"></p>
        <p class="apology">We apologize for any inconvenience. This feedback is taken very seriously and valued.</p>
        <p id="email-response" class="hidden">We'll respond to your email soon.</p>
      </div>
    </div>
    
    <div id="modal-loading" class="modal-loading hidden">
      <div class="spinner"></div>
      <p>Generating report context...</p>
    </div>
  </div>
</div>

<!-- script loaded as ES module for audio worklet imports -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="/static/app.js" type="module"></script>
</body>
</html>
