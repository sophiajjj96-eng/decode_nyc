steps:
  # Build container image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/algorithm-explained:$BUILD_ID', '-t', 'gcr.io/$PROJECT_ID/algorithm-explained:latest', '.']
  
  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '--all-tags', 'gcr.io/$PROJECT_ID/algorithm-explained']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'algorithm-explained'
      - '--image=gcr.io/$PROJECT_ID/algorithm-explained:$BUILD_ID'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--cpu=2'
      - '--timeout=3600'
      - '--max-instances=10'
      - '--service-account=algorithm-explained-sa@$PROJECT_ID.iam.gserviceaccount.com'
      - '--set-env-vars=GOOGLE_GENAI_USE_VERTEXAI=TRUE,GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=us-central1,DEMO_AGENT_MODEL=gemini-live-2.5-flash-native-audio,ENABLE_IMAGE_GEN=TRUE'

images:
  - 'gcr.io/$PROJECT_ID/algorithm-explained:$BUILD_ID'
  - 'gcr.io/$PROJECT_ID/algorithm-explained:latest'

options:
  logging: CLOUD_LOGGING_ONLY
